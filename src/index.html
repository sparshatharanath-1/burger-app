<!DOCTYPE html>
<html>
<head>
    <title>Burger App</title>

    <style>
        body { font-family: Arial; text-align: center; }
        .menu-item {
            margin: 10px;
            padding: 10px;
            border: 1px solid black;
            cursor: pointer;
        }
    </style>
</head>

<body>

<h1>🍔 Burger App</h1>

<button onclick="showMenu()">📋 Show Menu</button>

<div id="menu"></div>

<h2>🛒 Cart</h2>
<div id="cart"></div>

<button onclick="confirmOrder()">✅ Confirm</button>
<button onclick="cancelOrder()">❌ Cancel</button>

<div id="output"></div>

<script>

// 🔥 SHOW MENU (SIMPLE + WORKING)
function showMenu() {

    fetch("http://localhost:3000/menu")
    .then(res => res.json())
    .then(data => {

        let output = "";

        for (let item in data) {
            output += `
            <div class="menu-item" onclick="addToCart('${item}')">
                ${item.toUpperCase()} - ₹${data[item]}
            </div>`;
        }

        document.getElementById("menu").innerHTML = output;
    })
    .catch(err => {
        console.error(err);
        alert("Backend not running!");
    });
}

// 🛒 ADD TO CART
function addToCart(item) {

    let addon = prompt("Add-ons? mustard / chilli / cheese / no");

    fetch("http://localhost:3000/add-to-cart", {
        method: "POST",
        headers: {
            "Content-Type": "application/json"
        },
        body: JSON.stringify({ item, addon })
    })
    .then(() => loadCart());
}

// 📦 LOAD CART
function loadCart() {
    fetch("http://localhost:3000/cart")
    .then(res => res.json())
    .then(data => {
        let output = "";
        data.forEach(i => {
            output += i.item + " = ₹" + i.price + "<br>";
        });
        document.getElementById("cart").innerHTML = output;
    });
}

// ✅ CONFIRM
function confirmOrder() {
    fetch("http://localhost:3000/confirm", { method: "POST" })
    .then(res => res.json())
    .then(data => {
        document.getElementById("output").innerHTML = data.message;
        loadCart();
    });
}

// ❌ CANCEL
function cancelOrder() {
    fetch("http://localhost:3000/cancel", { method: "POST" })
    .then(res => res.json())
    .then(data => {
        document.getElementById("output").innerHTML = data.message;
        loadCart();
    });
}

</script>

</body>
</html>
