<!DOCTYPE html>
<html>
<head>
    <title>Burger App</title>

    <style>
        body {
            font-family: Arial;
            text-align: center;
        }

        button {
            margin: 10px;
            padding: 10px 20px;
            font-size: 16px;
            cursor: pointer;
        }

        #output {
            margin-top: 20px;
            font-size: 20px;
            color: blue;
            cursor: pointer;
        }
    </style>
</head>

<body>

<h1>🍔 BurgerApp</h1>

<h2>Menu</h2>

<button onclick="getPrice('chicken')">🍗 Chicken Burger</button>
<button onclick="getPrice('veg')">🥬 Veg Burger</button>
<button onclick="getPrice('pepsi')">🥤 Pepsi</button>
<button onclick="getPrice('coke')">🥤 Coke</button>
<button onclick="getPrice('dessert')">🍰 Dessert</button>

<div id="output"></div>

<script>
function getPrice(item) {
    fetch("http://localhost:3000/price/" + item)
    .then(response => response.json())
    .then(data => {
        document.getElementById("output").innerHTML =
            item + " = ₹" + data.price + " (Click to order)";

        document.getElementById("output").onclick = function() {
            placeOrder();
        };
    })
    .catch(error => {
        console.error("Error:", error);
        alert("Error connecting to backend");
    });
}

function placeOrder() {
    document.getElementById("output").innerHTML = "✅ Order Placed!";
}
</script>

</body>
</html>
